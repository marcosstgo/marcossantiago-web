server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 301 redirects — old URLs without /blog/ prefix
    location = /como-aplicar-luts-en-davinci-resolve/ { return 301 /blog/como-aplicar-luts-en-davinci-resolve/; }
    location = /que-puertos-usa-battlefield-6-en-pc/ { return 301 /blog/que-puertos-usa-battlefield-6-en-pc/; }
    location = /bad-bunny-el-arte-de-convertirse-en-una-marca-global/ { return 301 /blog/bad-bunny-el-arte-de-convertirse-en-una-marca-global/; }
    location = /caracteristicas-esenciales-para-un-creativo-excepcional/ { return 301 /blog/caracteristicas-esenciales-para-un-creativo-excepcional/; }
    location = /como-la-calidad-de-fotos-y-videos-impacta-el-exito-de-tus-productos-y-servicios/ { return 301 /blog/como-la-calidad-de-fotos-y-videos-impacta-el-exito-de-tus-productos-y-servicios/; }
    location = /de-verdad-lo-barato-sale-caro-en-el-diseno-una-reflexion-para-puerto-rico/ { return 301 /blog/de-verdad-lo-barato-sale-caro-en-el-diseno-una-reflexion-para-puerto-rico/; }
    location = /fotografia-de-landscape-tecnicas-para-capturar-paisajes-impresionantes/ { return 301 /blog/fotografia-de-landscape-tecnicas-para-capturar-paisajes-impresionantes/; }
    location = /guia-practica-como-elegir-o-revisar-la-paleta-de-colores-de-tu-portafolio-web-en-4-pasos/ { return 301 /blog/guia-practica-como-elegir-o-revisar-la-paleta-de-colores-de-tu-portafolio-web-en-4-pasos/; }
    location = /http-3-la-evolucion-del-protocolo-web/ { return 301 /blog/http-3-la-evolucion-del-protocolo-web/; }
    location = /la-importancia-de-tener-un-logotipo-en-los-negocios-pequenos-y-medianas-empresas/ { return 301 /blog/la-importancia-de-tener-un-logotipo-en-los-negocios-pequenos-y-medianas-empresas/; }
    location = /la-importancia-del-diseno-grafico-en-la-creacion-de-una-identidad-visual-efectiva-para-empresas/ { return 301 /blog/la-importancia-del-diseno-grafico-en-la-creacion-de-una-identidad-visual-efectiva-para-empresas/; }
    location = /la-psicologia-del-color-en-tu-web-como-los-colores-que-eliges-afectan-a-tus-clientes/ { return 301 /blog/la-psicologia-del-color-en-tu-web-como-los-colores-que-eliges-afectan-a-tus-clientes/; }
    location = /tipografia-en-el-diseno-como-elegir-la-fuente-perfecta/ { return 301 /blog/tipografia-en-el-diseno-como-elegir-la-fuente-perfecta/; }
    location = /titulo-mas-alla-del-raw-5-decisiones-creativas-que-tomar-antes-de-disparar-tu-camara/ { return 301 /blog/titulo-mas-alla-del-raw-5-decisiones-creativas-que-tomar-antes-de-disparar-tu-camara/; }
    location = /shop/ { return 301 /portafolio/; }

    # Shorts API — lista de archivos en JSON
    location /shorts-api/ {
        alias /usr/share/nginx/html/shorts-files/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
    }

    # Shorts videos — servir archivos directamente
    location /shorts-files/ {
        alias /usr/share/nginx/html/shorts-files/;
        add_header Cache-Control "no-cache";
    }

    # Clean URLs — try file, then directory, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache static assets
    location ~* \.(css|js|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for HTML
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Sitemap y robots
    location ~* \.(xml|txt)$ {
        add_header Content-Type "application/xml; charset=utf-8";
        expires 1d;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
