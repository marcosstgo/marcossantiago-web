name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 2222
          script: |
            set -e
            cd /home/corillo-adm/marcossantiago-web
            # Desplegar SOLO el/los servicio(s) cuyos archivos cambiaron. Necesario
            # porque 'docker compose up --build' recrea TODOS los servicios 'build'
            # cambie lo que cambie (comprobado empíricamente) → un deploy del web
            # tumbaba el sidecar del generador y los bots. Con diff por paths, un
            # cambio del web solo recrea el web. Si no hay diff detectable (p.ej.
            # commit hecho en el server → el pull es no-op), por defecto solo web;
            # los sub-servicios (logo-service/bot/blog-bot) se despliegan a mano.
            BEFORE=$(git rev-parse HEAD)
            git pull origin main
            AFTER=$(git rev-parse HEAD)
            if [ "$BEFORE" = "$AFTER" ]; then CHANGED=""; else CHANGED=$(git diff --name-only "$BEFORE" "$AFTER"); fi
            SERVICES=""
            add() { case " $SERVICES " in *" $1 "*) ;; *) SERVICES="$SERVICES $1";; esac; }
            printf '%s\n' "$CHANGED" | grep -q '^logo-service/' && add marcossantiago-logo || true
            printf '%s\n' "$CHANGED" | grep -q '^bot/'          && add marcossantiago-bot || true
            printf '%s\n' "$CHANGED" | grep -q '^blog-bot/'     && add marcossantiago-blog-bot || true
            NONSUB=$(printf '%s\n' "$CHANGED" | grep -vE '^(logo-service/|bot/|blog-bot/)' || true)
            if [ -z "$CHANGED" ] || [ -n "$NONSUB" ]; then add marcossantiago-web; fi
            echo "Servicios a desplegar:${SERVICES}"
            sudo docker compose up -d --build ${SERVICES}
            sudo docker image prune -f
            sleep 5
            # Incluye /logo-api/health para que un sidecar caído FALLE el deploy
            # (antes el healthcheck no lo cubría y quedaba en 502 sin avisar).
            for path in /logos-portfolio/abogo.png /logos-home/bambu.svg /portafolio/logos/ /logo-api/health; do
              code=""
              for attempt in 1 2 3 4 5; do
                code=$(curl -s -o /dev/null -w "%{http_code}" -L "https://marcossantiago.com${path}")
                [ "$code" = "200" ] && break
                sleep 3
              done
              if [ "$code" != "200" ]; then
                echo "Healthcheck FAILED: ${path} returned ${code}"
                exit 1
              fi
              echo "OK ${path} -> ${code}"
            done
